# ========================================
# VideoX Nginx 配置
# 放置位置: /etc/nginx/sites-available/videox
# 启用命令: sudo ln -s /etc/nginx/sites-available/videox /etc/nginx/sites-enabled/
# ========================================

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或服务器 IP

    # 日志
    access_log /var/log/nginx/videox_access.log;
    error_log /var/log/nginx/videox_error.log;

    # 客户端请求限制
    client_max_body_size 500M;  # 大文件上传
    client_body_timeout 300s;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========== 前端静态文件 ==========
    location / {
        root /opt/videox/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;  # Vue SPA 路由支持

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========== 后端 API 代理 ==========
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 请求头传递
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（视频下载可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ========== 下载文件 ==========
    location /api/v1/download/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 下载超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 禁用缓冲，支持大文件下载
        proxy_buffering off;
    }

    # ========== API 文档（可选，生产环境建议关闭） ==========
    # location /docs {
    #     proxy_pass http://127.0.0.1:8000;
    # }
}

