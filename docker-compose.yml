# ========================================
# VideoX Docker Compose 配置
# 使用: docker-compose up -d
# ========================================

version: '3.8'

services:
  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: videox-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端 API ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videox-api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      # - PROXY_URL=http://host.docker.internal:7890  # 如需代理
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Celery Worker ==========
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: videox-celery
    restart: always
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend/downloads:/app/downloads
      - ./backend/logs:/app/logs
      - ./backend/config:/app/config
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy

  # ========== Nginx（可选） ==========
  # nginx:
  #   image: nginx:alpine
  #   container_name: videox-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - backend

volumes:
  redis_data:
